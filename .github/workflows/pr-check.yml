name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  statuses: write

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    outputs:
      e2e-repo: ${{ steps.check-secrets.outputs.e2e-repo }}
      secrets-valid: ${{ steps.check-secrets.outputs.secrets-valid }}
    steps:
      - name: Check required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.E2E_REPO }}" ]; then
            echo "error=E2E_REPO secret is not set" >> $GITHUB_OUTPUT
            echo "secrets-valid=false" >> $GITHUB_OUTPUT
            echo "e2e-repo=" >> $GITHUB_OUTPUT
            exit 1
          fi
          if [ -z "${{ secrets.E2E_PAT }}" ]; then
            echo "error=E2E_PAT secret is not set" >> $GITHUB_OUTPUT
            echo "secrets-valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "secrets-valid=true" >> $GITHUB_OUTPUT
          echo "e2e-repo=${{ secrets.E2E_REPO }}" >> $GITHUB_OUTPUT

  build:
    name: Build and Trigger E2E
    runs-on: ubuntu-latest
    needs: validate-secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/
          retention-days: 7

      - name: Create pending status
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.E2E_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -d '{
              "state": "pending",
              "context": "e2e/coverage",
              "description": "E2E coverage analysis in progress..."
            }'

          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.E2E_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -d '{
              "state": "pending",
              "context": "e2e/tests",
              "description": "E2E tests in progress..."
            }'

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            src/**/*.{ts,tsx}
            **/*.{ts,tsx}

      - name: Trigger E2E tests
        if: success()
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          # Properly escape for JSON using jq
          CHANGED_JSON=$(echo "$CHANGED_FILES" | jq -Rs .)

          RESPONSE=$(curl -s -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.E2E_PAT }}" \
            https://api.github.com/repos/${{ needs.validate-secrets.outputs.e2e-repo }}/dispatches \
            -d "{
              \"event_type\": \"run-e2e-tests\",
              \"client_payload\": {
                \"source_repo\": \"${{ github.repository }}\",
                \"source_run_id\": \"${{ github.run_id }}\",
                \"commit_sha\": \"${{ github.event.pull_request.head.sha }}\",
                \"pr_number\": \"${{ github.event.number }}\",
                \"changed_files\": ${CHANGED_JSON}
              }
            }")

          HTTP_CODE="${RESPONSE: -3}"
          if [ "$HTTP_CODE" != "204" ]; then
            echo "Failed to trigger E2E workflow (HTTP: $HTTP_CODE)"
            exit 1
          fi

      - name: Workflow triggered
        run: |
          echo "E2E workflow triggered for commit ${{ github.event.pull_request.head.sha }}"
          echo "Visit ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} for details"
