name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  E2E_REPO: ${{ secrets.E2E_REPO }}

jobs:
  build:
    name: Build and Trigger E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/
          retention-days: 7

      - name: Create pending status
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.E2E_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -d '{
              "state": "pending",
              "context": "e2e/coverage",
              "description": "E2E coverage analysis in progress..."
            }'

          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.E2E_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -d '{
              "state": "pending",
              "context": "e2e/tests",
              "description": "E2E tests in progress..."
            }'

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            src/**/*.{ts,tsx}
            **/*.{ts,tsx}

      - name: Trigger E2E tests
        if: success()
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          # Convert newlines to spaces
          CHANGED_FILES=$(echo "$CHANGED_FILES" | tr '\n' ' ')
          # Escape for JSON
          CHANGED_FILES=$(echo "$CHANGED_FILES" | sed 's/"/\\"/g')

          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.E2E_PAT }}" \
            https://api.github.com/repos/${{ env.E2E_REPO }}/dispatches \
            -d "{
              \"event_type\": \"run-e2e-tests\",
              \"client_payload\": {
                \"source_repo\": \"${{ github.repository }}\",
                \"source_run_id\": \"${{ github.run_id }}\",
                \"commit_sha\": \"${{ github.event.pull_request.head.sha }}\",
                \"pr_number\": \"${{ github.event.number }}\",
                \"changed_files\": \"${CHANGED_FILES}\"
              }
            }"

      - name: Workflow triggered
        run: |
          echo "E2E workflow triggered for commit ${{ github.event.pull_request.head.sha }}"
          echo "Visit ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} for details"
